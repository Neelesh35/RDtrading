<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Product · RD Trading</title><link rel="stylesheet" href="assets/css/site.css"></head><body>
<div data-site-header></div><main class="section"><div class="container product-layout"><div class="gallery-card"><div class="gallery-main"><img id="productImage" alt=""></div></div><div class="info-card"><span class="badge" id="productBadge"></span><h1 id="productName" style="margin:12px 0 10px"></h1><div class="price" id="productPrice"></div><p class="muted" id="productDesc" style="margin:16px 0"></p><div class="row"><strong>Category</strong><span id="productCategory"></span></div><div class="row"><strong>Stock</strong><span id="productStock"></span></div><div class="row"><strong>Delivery</strong><span>Standard or express in Mauritius</span></div><div style="margin:22px 0 16px"><strong>Quantity</strong><div class="qty" style="margin-top:10px"><button onclick="changeQty(-1)">−</button><input id="qtyInput" value="1"><button onclick="changeQty(1)">+</button></div></div><div class="product-actions"><button class="btn btn-brand" id="addBtn">Add to cart</button><a class="btn-line" id="waBtn" target="_blank">Ask on WhatsApp</a></div><div class="policy-grid"><div class="policy-card"><strong>Standard</strong><div class="muted">Rs 100</div></div><div class="policy-card"><strong>Express</strong><div class="muted">Rs 500</div></div><div class="policy-card"><strong>Pickup</strong><div class="muted">Free</div></div></div></div></div></main><div data-site-footer></div><div data-site-widgets></div>
<script src="assets/js/products.js"></script><script src="assets/js/site.js"></script><script>renderHeader();renderFooter();renderFloatingWidgets();const id=query().get("id")||"RD001";const p=getProduct(id)||getProducts()[0];byId("productImage").src=productImage(p.image);byId("productImage").alt=p.name;byId("productBadge").textContent=p.badge;byId("productName").textContent=p.name;byId("productPrice").textContent=money(p.price);byId("productDesc").textContent=p.description;byId("productCategory").textContent=p.category;byId("productStock").textContent=p.stock+" in stock";byId("waBtn").href="https://wa.me/23058905265?text="+encodeURIComponent("Hi RD Trading, I want to ask about "+p.name+" ("+p.id+").");function changeQty(n){const el=byId("qtyInput");let v=Math.max(1,parseInt(el.value||1)+n);el.value=v;}byId("addBtn").onclick=()=>addToCart(p.id,Math.max(1,parseInt(byId("qtyInput").value||1)));</script></body></html>
