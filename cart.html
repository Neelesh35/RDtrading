<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cart · RD Trading</title><link rel="stylesheet" href="assets/css/site.css"></head><body>
<div data-site-header></div><main class="section"><div class="container cart-layout"><section><div class="section-head"><div><h2>Your cart</h2><p>Review your items before checkout.</p></div></div><div id="cartList"></div></section><aside class="checkout-box"><h3 style="margin-top:0">Order summary</h3><div class="row"><span>Subtotal</span><strong id="subTotal">Rs 0</strong></div><div class="row"><span>Standard delivery</span><strong>Rs 100</strong></div><hr style="border:none;border-top:1px solid var(--line);margin:18px 0"><div class="row total"><span>Total</span><span id="totalText">Rs 0</span></div><a class="btn btn-brand" style="width:100%;margin-top:16px" href="checkout.html">Continue to checkout</a><a class="btn-line" style="width:100%;margin-top:12px" href="https://wa.me/23058905265?text=Hi RD Trading, I want help with my order.">Order via WhatsApp</a></aside></div></main><div data-site-footer></div><div data-site-widgets></div>
<script src="assets/js/products.js"></script><script src="assets/js/site.js"></script><script>renderHeader();renderFooter();renderFloatingWidgets();function drawCart(){const items=getCart();const list=byId("cartList");if(!items.length){list.innerHTML='<div class="panel empty">Your cart is empty. <br><br><a class="btn btn-brand" href="shop.html">Start shopping</a></div>';byId("subTotal").textContent=money(0);byId("totalText").textContent=money(100);return;}let sub=0;list.innerHTML=items.map(item=>{sub+=item.price*item.qty;return `<div class="cart-row"><img src="${productImage(item.image)}" alt="${item.name}"><div><strong>${item.name}</strong><div class="muted">${money(item.price)} · Qty ${item.qty}</div></div><div style="display:grid;gap:8px"><strong>${money(item.price*item.qty)}</strong><button class="btn-line" onclick="removeFromCart('${item.id}'); drawCart();">Remove</button></div></div>`}).join("");byId("subTotal").textContent=money(sub);byId("totalText").textContent=money(sub+100);}drawCart();</script></body></html>
