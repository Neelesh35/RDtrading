<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checkout · RD Trading</title><link rel="stylesheet" href="assets/css/site.css"></head><body>
<div data-site-header></div><main class="section"><div class="container checkout-layout"><section class="checkout-box"><h2 style="margin-top:0">Checkout</h2><div class="form-stack"><div class="grid-2"><input class="input" placeholder="First name"><input class="input" placeholder="Last name"></div><div class="grid-2"><input class="input" placeholder="Email"><input class="input" placeholder="Phone"></div><textarea class="input" rows="4" placeholder="Delivery address"></textarea></div><h3 style="margin:26px 0 12px">Delivery</h3><div class="form-stack"><label class="radio-card active"><input type="radio" checked name="delivery"> <div><strong>Standard delivery</strong><div class="muted">Rs 100 · 2 to 5 working days</div></div></label><label class="radio-card"><input type="radio" name="delivery"> <div><strong>Express delivery</strong><div class="muted">Rs 500 · Same day / next day where available</div></div></label><label class="radio-card"><input type="radio" name="delivery"> <div><strong>Pickup</strong><div class="muted">Free collection point option</div></div></label></div><h3 style="margin:26px 0 12px">Payment</h3><div class="form-stack"><label class="radio-card active"><input type="radio" checked name="payment"> <div><strong>Cash on Delivery</strong><div class="muted">Pay when your order arrives.</div></div></label><label class="radio-card"><input type="radio" name="payment"> <div><strong>Bank Transfer</strong><div class="muted">Show transfer instructions after confirmation.</div></div></label><label class="radio-card"><input type="radio" name="payment"> <div><strong>Juice by MCB</strong><div class="muted">Integration-ready mobile payment option.</div></div></label><label class="radio-card"><input type="radio" name="payment"> <div><strong>Visa / Mastercard</strong><div class="muted">Card payment layout prepared for live gateway credentials.</div></div></label></div></section><aside class="checkout-box"><h3 style="margin-top:0">Summary</h3><div id="checkoutItems" class="form-stack"></div><hr style="border:none;border-top:1px solid var(--line);margin:18px 0"><div class="row"><span>Subtotal</span><strong id="coSub">Rs 0</strong></div><div class="row"><span>Delivery</span><strong id="coDelivery">Rs 100</strong></div><div class="row total"><span>Total</span><span id="coTotal">Rs 0</span></div><button class="btn btn-brand" style="width:100%;margin-top:16px" onclick="placeOrder()">Place order</button><a class="btn-line" style="width:100%;margin-top:12px" href="https://wa.me/23058905265?text=Hi RD Trading, I want to complete my order on WhatsApp.">Complete on WhatsApp</a><div class="notice" style="margin-top:14px">This checkout flow is polished and ready visually. Live payment collection still needs real gateway credentials before real sales.</div></aside></div></main><div data-site-footer></div><div data-site-widgets></div>
<script src="assets/js/products.js"></script><script src="assets/js/site.js"></script><script>renderHeader();renderFooter();renderFloatingWidgets();const items=getCart();let sub=0;byId("checkoutItems").innerHTML=items.map(i=>{sub+=i.price*i.qty;return `<div class="row"><span>${i.name} × ${i.qty}</span><strong>${money(i.price*i.qty)}</strong></div>`}).join("")||'<div class="muted">No items in cart.</div>';byId("coSub").textContent=money(sub);byId("coTotal").textContent=money(sub+100);function placeOrder(){alert("Order confirmed demo. Connect a live payment gateway and backend before going live.");localStorage.removeItem("rd_cart");location.href="index.html";}</script></body></html>
